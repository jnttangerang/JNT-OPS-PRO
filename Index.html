<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J&T OPS PRO - Sistem Operasional Outlet & Cargo</title>
    
    <!-- 1. Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- 2. Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    
    <!-- 3. React & ReactDOM 18 CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- 4. Babel Standalone (for in-browser JSX compiling) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 5. Lucide Icons Development CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- 6. Chart.js CDN (Super reliable inside single-file scripts) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- 7. html5-qrcode library CDN for scanning -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: rgba(249, 250, 251, 0.5);
        }
        /* Custom scrollbar for look & feel */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #d1d1d1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a1a1a1;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Primary target mount element -->
    <div id="root"></div>

    <!-- MAIN APP IN JSX -->
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // Custom Hook to map google.script.run natively
        function useAppsScript() {
            const [loading, setLoading] = useState(false);

            const callBackend = useCallback((action, params = {}) => {
                setLoading(true);
                const isGoogleScript = typeof google !== 'undefined' && google.script && google.script.run;

                if (isGoogleScript) {
                    return new Promise((resolve, reject) => {
                        google.script.run
                            .withSuccessHandler((response) => {
                                setLoading(false);
                                if (response && response.status === 'error') {
                                    reject(new Error(response.message || "Kesalahan backend"));
                                } else {
                                    resolve(response);
                                }
                            })
                            .withFailureHandler((err) => {
                                setLoading(false);
                                reject(err || new Error("Koneksi Apps Script terputus"));
                            })
                            .execAction(action, params);
                    });
                } else {
                    // Local browser simulation in case run offline or outside GAS
                    return new Promise((resolve, reject) => {
                        setTimeout(() => {
                            setLoading(false);
                            console.log(`[SIMULASI BACKEND] Action: ${action}`, params);
                            
                            // Mock outputs to keep app interactive outside sheets
                            if (action === 'login') {
                                if (params.username === 'admin1' && params.password === 'admin123') {
                                    resolve({ status: 'success', data: { user_id: 'admin1', username: 'admin1', name: 'Admin J&T', role: 'ADMIN', outlet_id_home: 'OUT01' } });
                                } else if (params.username === 'owner1' && params.password === 'owner123') {
                                    resolve({ status: 'success', data: { user_id: 'owner1', username: 'owner1', name: 'Owner Cargo & Express', role: 'OWNER', outlet_id_home: 'OUT01' } });
                                } else {
                                    reject(new Error("Username atau password salah (Gunakan admin1/admin123)"));
                                }
                            } else if (action === 'getOutlets') {
                                resolve({ status: 'success', data: [
                                    { outlet_id: 'OUT01', nama_outlet: 'J&T Express - Margonda Raya' },
                                    { outlet_id: 'OUT02', nama_outlet: 'J&T Express - Kemang Jakarta' },
                                    { outlet_id: 'OUT03', nama_outlet: 'J&T Cargo - Cikarang Pusat' }
                                ]});
                            } else if (action === 'searchCustomer') {
                                resolve({ status: 'success', data: [
                                    { customer_id: 'CST01', nama_pengirim: 'Toko Berkah Abadi', no_hp: '081234567890', alamat_pengirim: 'Jl. Margonda Raya No. 45, Beji, Depok, Jawa Barat' }
                                ]});
                            } else if (action === 'getRiwayatPenerima') {
                                resolve({ status: 'success', data: [
                                    { id: '1', nama_penerima: 'Budi Santoso', no_hp_penerima: '085311223344', alamat_penerima: 'Kavling Harmoni Blok B/3, Pancoran, Jakarta Selatan', tanggal_terakhir_kirim: '2026-07-01' }
                                ]});
                            } else if (action === 'checkDuplicateResi') {
                                resolve({ status: 'success', isDuplicate: params.resi_id === 'JT999999999' });
                            } else if (action === 'perbaikiAlamatAI') {
                                resolve({ status: 'success', data: params.alamat + " [DIPERBAIKI OLEH AI PAKAR ALAMAT J&T: RT/RW Terpola, Kodepos Teridentifikasi]" });
                            } else if (action === 'uploadFile') {
                                resolve({ status: 'success', data: 'https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&w=150&q=80' });
                            } else if (action === 'saveDataPreInput') {
                                resolve({ status: 'success', data: { transaksi_id: 'TX-' + Math.floor(Math.random() * 9000 + 1000) } });
                            } else if (action === 'saveTransaksi') {
                                resolve({ status: 'success' });
                            } else if (action === 'getDashboardData') {
                                resolve({
                                    status: 'success',
                                    data: {
                                        summary: { total_omset: 18500000, total_transaksi: 14, total_setoran_owner: 17200000, total_kas_operasional: 1300000 },
                                        audit_logs: [
                                            { id: '1', timestamp: new Date().toISOString(), admin_id: 'admin1', action: 'TRANSAKSI_BARU', details: 'Input resi JT12345678901 - Sukses' }
                                        ]
                                    }
                                });
                            } else {
                                resolve({ status: 'success', message: 'Simulasi sukses' });
                            }
                        }, 600);
                    });
                }
            }, []);

            return { callBackend, loading };
        }

        // Custom Icon helper (since we are in single file HTML, we manually render SVGs or use Lucide)
        function Icon({ name, className = "h-5 w-5" }) {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        }

        // ----------------- LOGIN PAGE SCREEN -----------------
        function LoginPage({ onLoginSuccess }) {
            const { callBackend, loading } = useAppsScript();
            const [username, setUsername] = useState("");
            const [password, setPassword] = useState("");
            const [error, setError] = useState(null);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError(null);
                if (!username || !password) {
                    setError("Username dan password wajib diisi!");
                    return;
                }
                try {
                    const response = await callBackend("login", { username, password });
                    if (response.status === "success" && response.data) {
                        onLoginSuccess(response.data);
                    } else {
                        setError(response.message || "Gagal masuk. Username atau password salah.");
                    }
                } catch (err) {
                    setError(err.message || "Terjadi kesalahan koneksi.");
                }
            };

            return (
                <div className="min-h-[85vh] flex items-center justify-center p-4">
                    <div className="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
                        <div className="bg-[#E4002B] px-6 py-8 text-white text-center relative overflow-hidden">
                            <div className="absolute inset-0 bg-black/10"></div>
                            <div className="relative z-10 flex flex-col items-center">
                                <div className="bg-white p-3 rounded-2xl shadow-md text-[#E4002B] mb-3">
                                    <Icon name="truck" className="h-8 w-8 text-[#E4002B]" />
                                </div>
                                <h1 className="text-2xl font-bold tracking-tight">J&T OPS PRO</h1>
                                <p className="text-xs text-red-100 mt-1 font-mono uppercase tracking-wider">
                                    Sistem Operasional Outlet & Cargo
                                </p>
                            </div>
                        </div>

                        <div className="p-6 sm:p-8">
                            <h2 className="text-lg font-semibold text-gray-800 mb-6 text-center">Log In Admin / Owner</h2>
                            {error && (
                                <div className="mb-5 p-4 bg-red-50 border-l-4 border-[#E4002B] text-red-700 text-sm rounded-r-lg flex items-start gap-2">
                                    <Icon name="shield-alert" className="h-5 w-5 text-[#E4002B]" />
                                    <div>
                                        <p className="font-semibold">Login Gagal</p>
                                        <p className="text-xs opacity-90 mt-0.5">{error}</p>
                                    </div>
                                </div>
                            )}

                            <form onSubmit={handleSubmit} className="space-y-5">
                                <div>
                                    <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Username</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                            <Icon name="user" className="h-5 w-5" />
                                        </div>
                                        <input
                                            type="text"
                                            value={username}
                                            onChange={(e) => setUsername(e.target.value)}
                                            className="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#E4002B] text-sm text-gray-800"
                                            placeholder="admin1 / owner1"
                                        />
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Password</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                            <Icon name="lock" className="h-5 w-5" />
                                        </div>
                                        <input
                                            type="password"
                                            value={password}
                                            onChange={(e) => setPassword(e.target.value)}
                                            className="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#E4002B] text-sm text-gray-800"
                                            placeholder="admin123 / owner123"
                                        />
                                    </div>
                                </div>

                                <button
                                    type="submit"
                                    disabled={loading}
                                    className="w-full py-3.5 bg-[#E4002B] hover:bg-[#c20023] disabled:bg-gray-400 text-white font-semibold rounded-xl shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2 cursor-pointer mt-2"
                                >
                                    {loading ? "Memverifikasi..." : "Masuk Sistem"}
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        // ----------------- PRE-INPUT PAGE SCREEN -----------------
        function PreInputPage({ session, activeOutletId, onChangeActiveOutlet, outlets, onNavigate }) {
            const { callBackend, loading } = useAppsScript();
            
            // States
            const [namaPengirim, setNamaPengirim] = useState("");
            const [hpPengirim, setHpPengirim] = useState("");
            const [alamatPengirim, setAlamatPengirim] = useState("");
            const [selectedCustomerId, setSelectedCustomerId] = useState(null);
            
            const [customerSuggestions, setCustomerSuggestions] = useState([]);
            const [showSuggestions, setShowSuggestions] = useState(false);
            const [searchingCustomer, setSearchingCustomer] = useState(false);
            
            const [riwayatPenerima, setRiwayatPenerima] = useState([]);
            const [loadingHistory, setLoadingHistory] = useState(false);

            const [namaPenerima, setNamaPenerima] = useState("");
            const [hpPenerima, setHpPenerima] = useState("");
            const [alamatPenerima, setAlamatPenerima] = useState("");
            const [optimizingAddress, setOptimizingAddress] = useState(false);
            const [aiNotice, setAiNotice] = useState(null);

            const [namaBarang, setNamaBarang] = useState("");
            const [beratKg, setBeratKg] = useState("0");
            const [volP, setVolP] = useState("");
            const [volL, setVolL] = useState("");
            const [volT, setVolT] = useState("");
            const [nilaiBarangRaw, setNilaiBarangRaw] = useState("");
            const [fotoUrl, setFotoUrl] = useState("");
            const [uploadingFoto, setUploadingFoto] = useState(false);

            const [submittedTxId, setSubmittedTxId] = useState(null);
            const [clearingText, setClearingText] = useState("");
            const [copiedNotification, setCopiedNotification] = useState(false);
            const [formError, setFormError] = useState(null);

            const cameraInputRef = useRef(null);
            const galleryInputRef = useRef(null);
            const clearingTextRef = useRef(null);

            // Debounced Customer Search
            useEffect(() => {
                if (namaPengirim.trim().length < 2 || selectedCustomerId) {
                    setCustomerSuggestions([]);
                    setShowSuggestions(false);
                    return;
                }
                setSearchingCustomer(true);
                const delayDebounceFn = setTimeout(async () => {
                    try {
                        const response = await callBackend("searchCustomer", { query: namaPengirim });
                        if (response.status === "success" && response.data) {
                            setCustomerSuggestions(response.data);
                            setShowSuggestions(response.data.length > 0);
                        }
                    } catch (e) {
                        console.error(e);
                    } finally {
                        setSearchingCustomer(false);
                    }
                }, 300);
                return () => clearTimeout(delayDebounceFn);
            }, [namaPengirim, selectedCustomerId]);

            // Fetch Recipient History
            useEffect(() => {
                if (!selectedCustomerId) {
                    setRiwayatPenerima([]);
                    return;
                }
                const fetchHistory = async () => {
                    setLoadingHistory(true);
                    try {
                        const response = await callBackend("getRiwayatPenerima", { customer_id: selectedCustomerId });
                        if (response.status === "success" && response.data) {
                            setRiwayatPenerima(response.data);
                        }
                    } catch (err) {
                        console.error(err);
                    } finally {
                        setLoadingHistory(false);
                    }
                };
                fetchHistory();
            }, [selectedCustomerId]);

            const handleNilaiBarangChange = (e) => {
                const cleaned = e.target.value.replace(/\D/g, "");
                setNilaiBarangRaw(cleaned ? Number(cleaned).toLocaleString("id-ID") : "");
            };

            const selectCustomer = (cst) => {
                setNamaPengirim(cst.nama_pengirim);
                setHpPengirim(cst.no_hp);
                setAlamatPengirim(cst.alamat_pengirim);
                setSelectedCustomerId(cst.customer_id);
                setShowSuggestions(false);
            };

            const selectRecipientFromHistory = (rec) => {
                setNamaPenerima(rec.nama_penerima);
                setHpPenerima(rec.no_hp_penerima);
                setAlamatPenerima(rec.alamat_penerima);
            };

            const handleOptimizeAddress = async () => {
                if (!alamatPenerima.trim()) {
                    setAiNotice({ type: "error", text: "Alamat kosong!" });
                    return;
                }
                setOptimizingAddress(true);
                setAiNotice(null);
                try {
                    const response = await callBackend("perbaikiAlamatAI", { alamat: alamatPenerima });
                    if (response.status === "success" && response.data) {
                        setAlamatPenerima(response.data);
                        setAiNotice({ type: "success", text: "Alamat rapi otomatis via AI!" });
                    }
                } catch (err) {
                    setAiNotice({ type: "error", text: "Gagal: kuota AI habis atau offline, gunakan manual." });
                } finally {
                    setOptimizingAddress(false);
                }
            };

            const handleFileChange = async (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                setUploadingFoto(true);
                try {
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        const response = await callBackend("uploadFile", {
                            fileBase64: reader.result,
                            fileName: file.name,
                            category: "FOTO_PAKET"
                        });
                        if (response.status === "success") {
                            setFotoUrl(response.data);
                        }
                    };
                    reader.readAsDataURL(file);
                } catch (err) {
                    setFormError("Gagal upload.");
                } finally {
                    setUploadingFoto(false);
                }
            };

            const handleSavePreInput = async () => {
                setFormError(null);
                if (!namaPengirim.trim() || !hpPengirim.trim() || !alamatPengirim.trim()) {
                    return setFormError("Isi seluruh data pengirim!");
                }
                if (!namaPenerima.trim() || !hpPenerima.trim() || !alamatPenerima.trim()) {
                    return setFormError("Isi seluruh data penerima!");
                }
                if (!namaBarang.trim()) return setFormError("Nama barang wajib!");

                const valNum = Number(nilaiBarangRaw.replace(/\D/g, "")) || 0;
                const vol = `${volP || "0"} x ${volL || "0"} x ${volT || "0"}`;

                const payload = {
                    admin_id: session.user_id,
                    outlet_id_tugas: activeOutletId,
                    nama_pengirim: namaPengirim.trim(),
                    hp_pengirim: hpPengirim.trim(),
                    alamat_pengirim: alamatPengirim.trim(),
                    nama_penerima: namaPenerima.trim(),
                    hp_penerima: hpPenerima.trim(),
                    alamat_penerima: alamatPenerima.trim(),
                    nama_barang: namaBarang.trim(),
                    berat_kg: Number(beratKg) || 0,
                    volume: vol,
                    nilai_barang: valNum,
                    foto_paket_url: fotoUrl
                };

                try {
                    const response = await callBackend("saveDataPreInput", payload);
                    if (response.status === "success" && response.data) {
                        setSubmittedTxId(response.data.transaksi_id);
                        setClearingText(`---
PENGIRIM: ${namaPengirim} (${hpPengirim}) - ${alamatPengirim}
PENERIMA: ${namaPenerima} (${hpPenerima}) - ${alamatPenerima}
PAKET: ${namaBarang} | ${beratKg} KG | Vol: ${vol} | Rp ${valNum.toLocaleString("id-ID")}
---`);
                    }
                } catch (err) {
                    setFormError(err.message);
                }
            };

            const handleClearingBoxClick = () => {
                if (clearingTextRef.current) {
                    clearingTextRef.current.select();
                    try {
                        navigator.clipboard.writeText(clearingText);
                        setCopiedNotification(true);
                        setTimeout(() => setCopiedNotification(false), 2000);
                    } catch (e) {}
                }
            };

            return (
                <div className="max-w-4xl mx-auto px-4 py-6">
                    <div className="bg-white rounded-2xl shadow-sm border p-6 mb-6 flex flex-col sm:flex-row justify-between gap-4">
                        <div>
                            <span className="bg-red-50 text-[#E4002B] text-[10px] font-bold px-2.5 py-1 rounded-full uppercase tracking-wider font-mono">PRE-INPUT PELANGGAN & PAKET</span>
                            <h1 className="text-2xl font-bold text-gray-800 mt-2">Pencatatan Data Awal</h1>
                        </div>
                        <div className="bg-gray-50 p-3 rounded-xl border flex flex-col gap-1 min-w-[200px]">
                            <span className="text-[10px] font-bold text-gray-400 uppercase">Outlet Tugas:</span>
                            <select value={activeOutletId} onChange={(e) => onChangeActiveOutlet(e.target.value)} className="bg-white border p-1.5 rounded-lg text-xs font-semibold text-gray-700">
                                {outlets.map(o => <option key={o.outlet_id} value={o.outlet_id}>{o.nama_outlet}</option>)}
                            </select>
                        </div>
                    </div>

                    {formError && <div className="p-3 bg-red-50 text-red-700 rounded-xl mb-4 text-xs font-bold">{formError}</div>}

                    {submittedTxId ? (
                        <div className="bg-white rounded-2xl shadow border p-6 text-center max-w-lg mx-auto">
                            <Icon name="check-circle-2" className="mx-auto h-12 w-12 text-green-500 mb-2" />
                            <h2 className="text-lg font-bold text-gray-800">Pre-Input Tersimpan!</h2>
                            <p className="text-xs font-mono font-bold text-green-600">ID: {submittedTxId}</p>
                            
                            <textarea
                                ref={clearingTextRef}
                                readOnly
                                onClick={handleClearingBoxClick}
                                value={clearingText}
                                className="w-full h-36 bg-gray-50 border rounded-xl p-3 font-mono text-xs mt-4 cursor-pointer resize-none"
                            />
                            <p className="text-[10px] text-gray-400 mt-1">{copiedNotification ? "Tersalin!" : "Klik kotak untuk salin ringkasan kliring"}</p>

                            <div className="mt-6 flex gap-3">
                                <button onClick={() => { setSubmittedTxId(null); setNamaPengirim(""); setNamaPenerima(""); setNamaBarang(""); }} className="flex-1 py-2.5 bg-gray-100 rounded-xl text-xs font-bold text-gray-700">Input Baru</button>
                                <button onClick={() => { localStorage.setItem("pending_transaksi_id", submittedTxId); onNavigate("transaksi"); }} className="flex-1 py-2.5 bg-[#E4002B] text-white rounded-xl text-xs font-bold">Lanjut Resi & Finansial</button>
                            </div>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {/* Pengirim */}
                            <div className="bg-white p-5 rounded-2xl border space-y-4">
                                <h3 className="font-bold text-sm text-gray-800 border-b pb-2">Data Pengirim</h3>
                                <div className="relative">
                                    <label className="text-[10px] uppercase font-bold text-gray-400">Nama Pengirim</label>
                                    <input type="text" value={namaPengirim} onChange={(e) => { setNamaPengirim(e.target.value); setSelectedCustomerId(null); }} className="w-full p-2 bg-gray-50 border rounded-lg text-xs" placeholder="Ketik nama ( suggestions aktif )" />
                                    {showSuggestions && (
                                        <div className="absolute z-30 bg-white border rounded-lg w-full mt-1 shadow-lg max-h-36 overflow-y-auto divide-y">
                                            {customerSuggestions.map(c => (
                                                <button key={c.customer_id} type="button" onClick={() => selectCustomer(c)} className="w-full text-left p-2.5 hover:bg-gray-50 text-xs">
                                                    <span className="font-bold text-gray-800 block">{c.nama_pengirim}</span>
                                                    <span className="text-gray-400 text-[10px]">{c.no_hp}</span>
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                <div>
                                    <label className="text-[10px] uppercase font-bold text-gray-400">No HP</label>
                                    <input type="text" value={hpPengirim} onChange={(e) => setHpPengirim(e.target.value)} className="w-full p-2 bg-gray-50 border rounded-lg text-xs" placeholder="08xxxxxxxx" />
                                </div>

                                <div>
                                    <label className="text-[10px] uppercase font-bold text-gray-400">Alamat</label>
                                    <textarea value={alamatPengirim} onChange={(e) => setAlamatPengirim(e.target.value)} rows="3" className="w-full p-2 bg-gray-50 border rounded-lg text-xs resize-none" placeholder="Alamat lengkap" />
                                </div>

                                {selectedCustomerId && riwayatPenerima.length > 0 && (
                                    <div className="border-t pt-2 mt-2">
                                        <p className="text-[10px] font-bold text-gray-400 uppercase mb-1">Riwayat Kiriman Terakhir:</p>
                                        <div className="space-y-1.5 max-h-24 overflow-y-auto pr-1">
                                            {riwayatPenerima.map(r => (
                                                <button key={r.id} type="button" onClick={() => selectRecipientFromHistory(r)} className="w-full text-left p-1.5 bg-gray-50 hover:bg-red-50 rounded text-[10px] flex justify-between">
                                                    <span className="font-semibold text-gray-700">{r.nama_penerima}</span>
                                                    <span className="text-gray-400 truncate max-w-[150px]">{r.alamat_penerima}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Penerima & Paket */}
                            <div className="space-y-6">
                                <div className="bg-white p-5 rounded-2xl border space-y-4">
                                    <div className="flex justify-between items-center border-b pb-2">
                                        <h3 className="font-bold text-sm text-gray-800">Data Penerima</h3>
                                        <button onClick={handleOptimizeAddress} disabled={optimizingAddress} className="text-[10px] font-bold text-[#E4002B] bg-red-50 py-1 px-2 rounded-lg">
                                            {optimizingAddress ? "Merampingkan..." : "✨ AI Alamat"}
                                        </button>
                                    </div>
                                    <div>
                                        <label className="text-[10px] uppercase font-bold text-gray-400">Nama Penerima</label>
                                        <input type="text" value={namaPenerima} onChange={(e) => setNamaPenerima(e.target.value)} className="w-full p-2 bg-gray-50 border rounded-lg text-xs" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] uppercase font-bold text-gray-400">No HP</label>
                                        <input type="text" value={hpPenerima} onChange={(e) => setHpPenerima(e.target.value)} className="w-full p-2 bg-gray-50 border rounded-lg text-xs" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] uppercase font-bold text-gray-400">Alamat</label>
                                        <textarea value={alamatPenerima} onChange={(e) => setAlamatPenerima(e.target.value)} rows="2" className="w-full p-2 bg-gray-50 border rounded-lg text-xs resize-none" />
                                        {aiNotice && <div className="mt-1 text-[10px] text-green-700 font-semibold">{aiNotice.text}</div>}
                                    </div>
                                </div>

                                <div className="bg-white p-5 rounded-2xl border space-y-4">
                                    <h3 className="font-bold text-sm text-gray-800 border-b pb-2">Data Paket</h3>
                                    <div>
                                        <label className="text-[10px] uppercase font-bold text-gray-400">Nama Barang</label>
                                        <input type="text" value={namaBarang} onChange={(e) => setNamaBarang(e.target.value)} className="w-full p-2 bg-gray-50 border rounded-lg text-xs" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-[10px] uppercase font-bold text-gray-400">Berat (KG)</label>
                                            <input type="number" step="0.1" value={beratKg} onChange={(e) => setBeratKg(e.target.value)} className="w-full p-2 bg-gray-50 border rounded-lg text-xs" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase font-bold text-gray-400">Nilai Barang (Rp)</label>
                                            <input type="text" value={nilaiBarangRaw} onChange={handleNilaiBarangChange} className="w-full p-2 bg-gray-50 border rounded-lg text-xs" placeholder="Asuransi" />
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-[10px] uppercase font-bold text-gray-400 block mb-1">Ambil Foto Fisik</label>
                                        <div className="flex gap-2">
                                            <button type="button" onClick={() => cameraInputRef.current?.click()} className="flex-1 py-1.5 bg-gray-100 rounded text-[11px] font-bold text-gray-600">📷 HP Kamera</button>
                                            <button type="button" onClick={() => galleryInputRef.current?.click()} className="flex-1 py-1.5 bg-gray-100 rounded text-[11px] font-bold text-gray-600">🖼️ Galeri</button>
                                        </div>
                                        <input type="file" ref={cameraInputRef} onChange={handleFileChange} accept="image/*" capture="environment" className="hidden" />
                                        <input type="file" ref={galleryInputRef} onChange={handleFileChange} accept="image/*" className="hidden" />
                                        
                                        {uploadingFoto && <div className="text-[10px] text-gray-400 mt-1 animate-pulse">Mengunggah ke Drive...</div>}
                                        {fotoUrl && <div className="text-[10px] text-green-700 mt-1">✓ Berhasil upload: {fotoUrl.slice(0, 40)}...</div>}
                                    </div>
                                </div>

                                <button onClick={handleSavePreInput} disabled={loading || uploadingFoto} className="w-full py-3 bg-[#E4002B] text-white font-bold rounded-xl text-sm shadow">
                                    {loading ? "Menyimpan data..." : "Simpan Data & Buat Layar Kliring"}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ----------------- TRANSAKSI PAGE SCREEN -----------------
        function TransaksiPage({ session, activeOutletId, onChangeActiveOutlet, outlets, onNavigate }) {
            const { callBackend, loading } = useAppsScript();
            
            // Recover Pre-Input
            const [pendingTxId, setPendingTxId] = useState(null);
            const [preInputData, setPreInputData] = useState(null);
            
            const [jenisLayanan, setJenisLayanan] = useState("Express");
            const [resiId, setResiId] = useState("");
            const [showScanner, setShowScanner] = useState(false);
            const [checkingResi, setCheckingResi] = useState(false);
            const [resiDuplicateError, setResiDuplicateError] = useState(false);

            const [tipeProdukExp, setTipeProdukExp] = useState("EZ");
            const [tipeProdukCrg, setTipeProdukCrg] = useState("FastTrack");

            // Motor details
            const [merkMotor, setMerkMotor] = useState("");
            const [ccMotor, setCcMotor] = useState("");
            const [tahunMotor, setTahunMotor] = useState("");
            const [kelengkapanMotor, setKelengkapanMotor] = useState([]);

            const [biayaLainInput, setBiayaLainInput] = useState("");
            const [biayaAsuransiInput, setBiayaAsuransiInput] = useState("");
            const [ongkirDasarInput, setOngkirDasarInput] = useState("");
            const [totalUangDibayarInput, setTotalUangDibayarInput] = useState("");
            const [metodeBayar, setMetodeBayar] = useState("Tunai");
            const [buktiBayarUrl, setBuktiBayarUrl] = useState("");
            const [uploadingBukti, setUploadingBukti] = useState(false);

            const [aktifkanBiayaTambahan, setAktifkanBiayaTambahan] = useState(false);
            const [biayaAmplopInput, setBiayaAmplopInput] = useState("");
            const [biayaPackingInput, setBiayaPackingInput] = useState("");
            const [metodeBayarTambahan, setMetodeBayarTambahan] = useState("Tunai");
            const [buktiTambahanUrl, setBuktiTambahanUrl] = useState("");
            const [uploadingBuktiTambahan, setUploadingBuktiTambahan] = useState(false);

            const [transactionSuccess, setTransactionSuccess] = useState(false);
            const [savedResiSummary, setSavedResiSummary] = useState(null);
            const [formError, setFormError] = useState(null);

            const fileInputRef1 = useRef(null);
            const fileInputRef2 = useRef(null);

            useEffect(() => {
                const pId = localStorage.getItem("pending_transaksi_id");
                if (pId) {
                    setPendingTxId(pId);
                    loadPreInputDetails(pId);
                }
            }, []);

            const loadPreInputDetails = async (txId) => {
                try {
                    const response = await callBackend("getPreInput", { transaksi_id: txId });
                    if (response.status === "success" && response.data) {
                        setPreInputData(response.data);
                        if (response.data.berat_kg >= 15) setJenisLayanan("Cargo");
                    }
                } catch (e) {}
            };

            const handleVerifyResi = async (idToCheck) => {
                const id = idToCheck.toUpperCase().trim();
                if (!id) return;
                setCheckingResi(true);
                try {
                    const response = await callBackend("checkDuplicateResi", { resi_id: id });
                    if (response.status === "success") {
                        setResiDuplicateError(response.isDuplicate);
                    }
                } catch (e) {
                } finally {
                    setCheckingResi(false);
                }
            };

            // DOC Special Rules
            useEffect(() => {
                if (jenisLayanan === "Express") {
                    if (tipeProdukExp === "DOC") {
                        setBiayaLainInput("1.000");
                        if (aktifkanBiayaTambahan) setBiayaAmplopInput("2.000");
                    } else {
                        setBiayaLainInput("");
                        setBiayaAmplopInput("");
                    }
                }
            }, [tipeProdukExp, jenisLayanan, aktifkanBiayaTambahan]);

            const cleanNumber = (v) => Number(v.replace(/\D/g, "")) || 0;
            const formatThousands = (v) => {
                const cleaned = v.replace(/\D/g, "");
                return cleaned ? Number(cleaned).toLocaleString("id-ID") : "";
            };

            const handleUploadProof = async (e, isSurchargeProof) => {
                const file = e.target.files?.[0];
                if (!file) return;
                if (isSurchargeProof) setUploadingBuktiTambahan(true); else setUploadingBukti(true);

                const dateStr = new Date().toISOString().split("T")[0].replace(/-/g, "");
                const genName = isSurchargeProof ? `BB-ADD_${dateStr}_${resiId}` : `BB-${jenisLayanan === "Express" ? "YoYi" : "JTC"}_${dateStr}_${resiId}`;

                try {
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        const response = await callBackend("uploadFile", {
                            fileBase64: reader.result,
                            fileName: genName,
                            category: isSurchargeProof ? "BUKTI_ADD" : "BUKTI_BAYAR"
                        });
                        if (response.status === "success") {
                            if (isSurchargeProof) setBuktiTambahanUrl(response.data); else setBuktiBayarUrl(response.data);
                        }
                    };
                    reader.readAsDataURL(file);
                } catch (err) {
                    setFormError("Gagal upload");
                } finally {
                    setUploadingBukti(false);
                    setUploadingBuktiTambahan(false);
                }
            };

            // Calculations
            const bLain = jenisLayanan === "Express" ? cleanNumber(biayaLainInput) : 0;
            const bAsuransi = cleanNumber(biayaAsuransiInput);
            const bOngkir = cleanNumber(ongkirDasarInput);
            const totalBase = bLain + bAsuransi + bOngkir;
            const customerPay = cleanNumber(totalUangDibayarInput);
            const pembulatan = customerPay > 0 ? (customerPay - totalBase) : 0;

            const bAmplop = (aktifkanBiayaTambahan && jenisLayanan === "Express") ? cleanNumber(biayaAmplopInput) : 0;
            const bPacking = aktifkanBiayaTambahan ? cleanNumber(biayaPackingInput) : 0;
            const totalAdd = bAmplop + bPacking;

            const grandTotal = totalBase + pembulatan + totalAdd;
            const setoranOwner = totalBase + pembulatan;
            const kasLoket = totalAdd;

            const handleSaveTransaksi = async () => {
                setFormError(null);
                if (!resiId.trim()) return setFormError("Resi id wajib!");
                if (resiDuplicateError) return setFormError("Resi duplikat/fraud!");
                if (bOngkir <= 0) return setFormError("Ongkir dasar wajib diisi!");
                if (customerPay <= 0) return setFormError("Isi nominal uang dibayar customer!");

                if (metodeBayar !== "Tunai" && !buktiBayarUrl) {
                    return setFormError("Upload bukti bayar non-tunai!");
                }

                const transactionPayload = {
                    resi_id: resiId.toUpperCase().trim(),
                    transaksi_id: pendingTxId || "",
                    admin_id_pencatat: session.user_id,
                    outlet_id_input: activeOutletId,
                    tipe_produk: jenisLayanan === "Express" ? tipeProdukExp : tipeProdukCrg,
                    biaya_lain: bLain,
                    biaya_asuransi: bAsuransi,
                    ongkir_dasar: bOngkir,
                    biaya_yoyi: jenisLayanan === "Express" ? totalBase : 0,
                    biaya_jtc: jenisLayanan === "Cargo" ? totalBase : 0,
                    total_dibayar_customer: customerPay,
                    pembulatan: pembulatan,
                    metode_bayar: metodeBayar,
                    bukti_bayar_url: buktiBayarUrl,
                    biaya_amplop: bAmplop,
                    biaya_packing: bPacking,
                    metode_bayar_tambahan: aktifkanBiayaTambahan ? metodeBayarTambahan : "",
                    bukti_tambahan_url: aktifkanBiayaTambahan ? buktiTambahanUrl : "",
                    grand_total: grandTotal,
                    setoran_ke_owner: setoranOwner,
                    kas_operasional: kasLoket
                };

                try {
                    const response = await callBackend("saveTransaksi", {
                        jenis_layanan: jenisLayanan,
                        data: transactionPayload
                    });
                    if (response.status === "success") {
                        setTransactionSuccess(true);
                        setSavedResiSummary(resiId);
                        localStorage.removeItem("pending_transaksi_id");
                    }
                } catch (e) {
                    setFormError(e.message);
                }
            };

            return (
                <div className="max-w-4xl mx-auto px-4 py-6">
                    <div className="bg-white rounded-2xl border p-6 mb-6 flex flex-col sm:flex-row justify-between gap-4">
                        <div>
                            <span className="bg-red-50 text-[#E4002B] text-[10px] font-bold px-2.5 py-1 rounded-full uppercase font-mono">FINANSIAL & TRANSAKSI LOKET</span>
                            <h1 className="text-2xl font-bold text-gray-800 mt-1">Input Resi & Kalkulasi Finansial</h1>
                        </div>
                        <div className="bg-gray-50 p-3 rounded-xl border flex flex-col gap-1 min-w-[200px]">
                            <span className="text-[10px] font-bold text-gray-400 uppercase">Outlet Input:</span>
                            <select value={activeOutletId} onChange={(e) => onChangeActiveOutlet(e.target.value)} className="bg-white border p-1.5 rounded-lg text-xs font-semibold text-gray-700">
                                {outlets.map(o => <option key={o.outlet_id} value={o.outlet_id}>{o.nama_outlet}</option>)}
                            </select>
                        </div>
                    </div>

                    {formError && <div className="p-3 bg-red-50 text-red-700 rounded-xl mb-4 text-xs font-bold">{formError}</div>}

                    {transactionSuccess ? (
                        <div className="bg-white rounded-2xl shadow border p-6 text-center max-w-lg mx-auto">
                            <Icon name="check-circle" className="mx-auto h-12 w-12 text-green-500 mb-2" />
                            <h2 className="text-lg font-bold text-gray-800">Transaksi Berhasil Disimpan!</h2>
                            <p className="text-xs text-green-600 font-mono font-bold">RESI: {savedResiSummary}</p>
                            
                            <div className="my-4 p-3 bg-gray-50 rounded text-xs text-left space-y-1.5">
                                <div className="flex justify-between"><span>Setoran Owner (YoYi/JTC):</span><span className="font-bold">Rp {setoranOwner.toLocaleString("id-ID")}</span></div>
                                <div className="flex justify-between"><span>Kas Operasional Outlet:</span><span className="font-bold">Rp {kasLoket.toLocaleString("id-ID")}</span></div>
                            </div>
                            
                            <button onClick={() => { setTransactionSuccess(false); setResiId(""); setPreInputData(null); }} className="w-full py-2 bg-[#E4002B] text-white rounded-lg text-xs font-bold mt-2">Buat Transaksi Baru</button>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="space-y-6">
                                {/* SCAN */}
                                <div className="bg-white p-5 rounded-2xl border space-y-4">
                                    <h3 className="font-bold text-sm text-gray-800 border-b pb-2 flex justify-between">
                                        <span>Scan Barcode / Resi</span>
                                        <button onClick={() => {
                                            setShowScanner(!showScanner);
                                            setTimeout(() => {
                                                if(!showScanner) {
                                                    const scanner = new Html5QrcodeScanner("reader-html5", { fps: 10, qrbox: 250 });
                                                    scanner.render((text) => {
                                                        setResiId(text);
                                                        handleVerifyResi(text);
                                                        scanner.clear();
                                                        setShowScanner(false);
                                                    });
                                                }
                                            }, 200);
                                        }} className="text-[10px] text-red-600 bg-red-50 py-1 px-2.5 rounded"> Kamera HP Scanner</button>
                                    </h3>
                                    
                                    {showScanner && <div id="reader-html5" className="border p-2 rounded bg-gray-50"></div>}

                                    <div>
                                        <label className="text-[10px] uppercase font-bold text-gray-400">Nomor Resi J&T</label>
                                        <input type="text" value={resiId} onChange={(e) => { setResiId(e.target.value.toUpperCase()); handleVerifyResi(e.target.value); }} className={`w-full p-2.5 bg-gray-50 border rounded-lg text-xs font-mono tracking-wider ${resiDuplicateError ? 'border-red-400 bg-red-50' : ''}`} placeholder="SCAN BARCODE / KETIK MANUAL" />
                                        {resiDuplicateError && <p className="text-[10px] text-red-600 font-bold mt-1">⚠️ RESI DUPLIKAT TERDETEKSI (ANTI-FRAUD BLOCKED)</p>}
                                    </div>
                                </div>

                                {/* CALCULATIONS */}
                                <div className="bg-white p-5 rounded-2xl border space-y-4">
                                    <div className="flex gap-2">
                                        <button onClick={() => setJenisLayanan("Express")} className={`flex-1 py-1 px-2 text-xs font-bold rounded ${jenisLayanan === 'Express' ? 'bg-[#E4002B] text-white' : 'bg-gray-100 text-gray-600'}`}>Express</button>
                                        <button onClick={() => setJenisLayanan("Cargo")} className={`flex-1 py-1 px-2 text-xs font-bold rounded ${jenisLayanan === 'Cargo' ? 'bg-[#E4002B] text-white' : 'bg-gray-100 text-gray-600'}`}>Cargo</button>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        {jenisLayanan === "Express" ? (
                                            <div>
                                                <label className="text-[10px] uppercase font-bold text-gray-400">Tipe Produk</label>
                                                <select value={tipeProdukExp} onChange={(e) => setTipeProdukExp(e.target.value)} className="w-full bg-gray-50 border p-2 rounded text-xs">
                                                    <option value="EZ">EZ (Reguler)</option>
                                                    <option value="DOC">DOC (Dokumen)</option>
                                                    <option value="JND">JND (Next Day)</option>
                                                </select>
                                            </div>
                                        ) : (
                                            <div>
                                                <label className="text-[10px] uppercase font-bold text-gray-400">Cargo Produk</label>
                                                <select value={tipeProdukCrg} onChange={(e) => setTipeProdukCrg(e.target.value)} className="w-full bg-gray-50 border p-2 rounded text-xs">
                                                    <option value="FastTrack">FastTrack (Kilat)</option>
                                                    <option value="Motor">Motor (Kirim Kendaraan)</option>
                                                </select>
                                            </div>
                                        )}

                                        <div>
                                            <label className="text-[10px] uppercase font-bold text-gray-400">Biaya Lain (Rp)</label>
                                            <input type="text" disabled={jenisLayanan === 'Express' && tipeProdukExp === 'DOC'} value={biayaLainInput} onChange={(e) => setBiayaLainInput(formatThousands(e.target.value))} className="w-full p-2 bg-gray-50 border rounded text-xs" />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-[10px] uppercase font-bold text-gray-400">Asuransi (Rp)</label>
                                            <input type="text" value={biayaAsuransiInput} onChange={(e) => setBiayaAsuransiInput(formatThousands(e.target.value))} className="w-full p-2 bg-gray-50 border rounded text-xs" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase font-bold text-gray-400">Ongkir Dasar (Rp)</label>
                                            <input type="text" value={ongkirDasarInput} onChange={(e) => setOngkirDasarInput(formatThousands(e.target.value))} className="w-full p-2 bg-gray-50 border rounded text-xs" />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3 border-t pt-3">
                                        <div>
                                            <label className="text-[10px] uppercase font-bold text-gray-400">Dibayar Customer (Rp)</label>
                                            <input type="text" value={totalUangDibayarInput} onChange={(e) => setTotalUangDibayarInput(formatThousands(e.target.value))} className="w-full p-2 bg-gray-50 border rounded font-bold text-xs" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] uppercase font-bold text-gray-400">Selisih/Pembulatan</label>
                                            <div className="p-2 bg-gray-100 rounded text-xs font-bold text-gray-600">Rp {pembulatan.toLocaleString("id-ID")}</div>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-[10px] uppercase font-bold text-gray-400">Metode Bayar</label>
                                        <select value={metodeBayar} onChange={(e) => setMetodeBayar(e.target.value)} className="w-full p-2 bg-gray-50 border rounded text-xs">
                                            <option value="Tunai">Tunai (Cash)</option>
                                            <option value="QRIS">QRIS Barcode</option>
                                            <option value="Transfer">Transfer Bank</option>
                                        </select>
                                        {metodeBayar !== 'Tunai' && (
                                            <div className="mt-2 p-2 bg-red-50 rounded border">
                                                <input type="file" ref={fileInputRef1} onChange={(e) => handleUploadProof(e, false)} accept="image/*" className="text-xs" />
                                                {uploadingBukti && <span className="text-[10px] text-gray-400 block mt-1 animate-pulse">Mengunggah...</span>}
                                                {buktiBayarUrl && <span className="text-[10px] text-green-700 font-bold block mt-1">Uploaded!</span>}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* RIGHT COLUMN */}
                            <div className="space-y-6">
                                <div className="bg-white p-5 rounded-2xl border space-y-4">
                                    <div className="flex justify-between items-center border-b pb-2">
                                        <h3 className="font-bold text-sm text-gray-800">Biaya Tambahan</h3>
                                        <input type="checkbox" checked={aktifkanBiayaTambahan} onChange={(e) => setAktifkanBiayaTambahan(e.target.checked)} className="accent-[#E4002B]" />
                                    </div>

                                    {aktifkanBiayaTambahan ? (
                                        <div className="space-y-3">
                                            <div className="grid grid-cols-2 gap-3">
                                                <div>
                                                    <label className="text-[10px] uppercase font-bold text-gray-400">Biaya Amplop</label>
                                                    <input type="text" disabled={jenisLayanan === 'Express' && tipeProdukExp === 'DOC'} value={biayaAmplopInput} onChange={(e) => setBiayaAmplopInput(formatThousands(e.target.value))} className="w-full p-2 bg-gray-50 border rounded text-xs" />
                                                </div>
                                                <div>
                                                    <label className="text-[10px] uppercase font-bold text-gray-400">Biaya Packing</label>
                                                    <input type="text" value={biayaPackingInput} onChange={(e) => setBiayaPackingInput(formatThousands(e.target.value))} className="w-full p-2 bg-gray-50 border rounded text-xs" />
                                                </div>
                                            </div>
                                            <div>
                                                <label className="text-[10px] uppercase font-bold text-gray-400">Metode Bayar Tambahan</label>
                                                <select value={metodeBayarTambahan} onChange={(e) => setMetodeBayarTambahan(e.target.value)} className="w-full p-2 bg-gray-50 border rounded text-xs">
                                                    <option value="Tunai">Tunai</option>
                                                    <option value="QRIS">QRIS</option>
                                                </select>
                                            </div>
                                        </div>
                                    ) : (
                                        <p className="text-xs text-gray-400 italic">Tambahan (Amplop & Packing) dimatikan.</p>
                                    )}
                                </div>

                                <div className="bg-white p-5 rounded-2xl border space-y-4">
                                    <h3 className="font-bold text-sm text-gray-800 border-b pb-2">Alokasi Keuangan & Setoran</h3>
                                    <div className="p-4 bg-gray-950 text-[#E4002B] rounded-xl text-center font-mono">
                                        <span className="text-[9px] uppercase text-gray-400 block">Grand Total Tagihan</span>
                                        <span className="text-2xl font-bold">Rp {grandTotal.toLocaleString("id-ID")}</span>
                                    </div>

                                    <div className="grid grid-cols-2 gap-2 text-center text-xs">
                                        <div className="p-2 bg-blue-50 border rounded-lg">
                                            <span className="text-[9px] uppercase font-bold text-blue-600 block">Wajib Setor Owner</span>
                                            <span className="font-mono font-bold text-blue-800">Rp {setoranOwner.toLocaleString("id-ID")}</span>
                                        </div>
                                        <div className="p-2 bg-green-50 border rounded-lg">
                                            <span className="text-[9px] uppercase font-bold text-green-600 block">Kas Operasional</span>
                                            <span className="font-mono font-bold text-green-800">Rp {kasLoket.toLocaleString("id-ID")}</span>
                                        </div>
                                    </div>

                                    <button onClick={handleSaveTransaksi} disabled={loading || resiDuplicateError} className="w-full py-3.5 bg-[#E4002B] hover:bg-[#c20023] text-white font-bold rounded-xl text-sm transition">
                                        Simpan & Selesaikan Transaksi
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ----------------- DASHBOARD SCREEN (OWNER LOCK) -----------------
        function DashboardPage({ session, outlets }) {
            const { callBackend } = useAppsScript();
            const isOwner = session.role === "OWNER";

            const [selectedOutletFilter, setSelectedOutletFilter] = useState("ALL");
            const [startDate, setStartDate] = useState(() => {
                const d = new Date();
                d.setDate(d.getDate() - 15);
                return d.toISOString().split("T")[0];
            });
            const [endDate, setEndDate] = useState(() => new Date().toISOString().split("T")[0]);

            const [dashboardData, setDashboardData] = useState(null);
            const [loadingDashboard, setLoadingDashboard] = useState(false);
            const [seedSuccess, setSeedSuccess] = useState(null);
            const [seeding, setSeeding] = useState(false);
            const [auditSearch, setAuditSearch] = useState("");

            const loadDashboardMetrics = async () => {
                if (!isOwner) return;
                setLoadingDashboard(true);
                try {
                    const response = await callBackend("getDashboardData", {
                        outlet_id: selectedOutletFilter,
                        start_date: startDate,
                        end_date: endDate
                    });
                    if (response.status === "success" && response.data) {
                        setDashboardData(response.data);
                    }
                } catch (e) {
                } finally {
                    setLoadingDashboard(false);
                }
            };

            useEffect(() => {
                loadDashboardMetrics();
            }, [selectedOutletFilter, startDate, endDate]);

            const handleSeedDatabase = async () => {
                setSeeding(true);
                setSeedSuccess(null);
                try {
                    const response = await callBackend("initDatabaseSheets");
                    if (response.status === "success") {
                        setSeedSuccess("Database Sheets & JSON berhasil di-seed (disemai) dengan data uji coba!");
                        loadDashboardMetrics();
                    }
                } catch (err) {
                    setSeedSuccess("Error: " + err.message);
                } finally {
                    setSeeding(false);
                }
            };

            if (!isOwner) {
                return (
                    <div className="max-w-md mx-auto px-4 py-16 text-center">
                        <Icon name="lock" className="mx-auto h-12 w-12 text-amber-500 mb-2" />
                        <h2 className="text-lg font-bold text-gray-800">Akses Terkunci</h2>
                        <p className="text-xs text-gray-500 mt-1">Halaman finansial, audit log, dan dashboard grafik omset harian hanya dapat diakses oleh role OWNER.</p>
                    </div>
                );
            }

            const filteredLogs = dashboardData?.audit_logs?.filter(log => {
                const searchStr = auditSearch.toLowerCase();
                return log.action.toLowerCase().includes(searchStr) || log.admin_id.toLowerCase().includes(searchStr) || (log.details && log.details.toLowerCase().includes(searchStr));
            }) || [];

            return (
                <div className="max-w-5xl mx-auto px-4 py-6 space-y-6">
                    <div className="bg-white p-6 rounded-2xl border flex flex-col sm:flex-row justify-between gap-4">
                        <div>
                            <span className="bg-red-50 text-[#E4002B] text-[10px] font-bold px-2 py-0.5 rounded uppercase font-mono">OWNER BUSINESS INTEL</span>
                            <h1 className="text-2xl font-bold text-gray-800">Laporan Keuangan Outlet</h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={handleSeedDatabase} disabled={seeding} className="py-2 px-3 bg-gray-900 text-white rounded-xl text-xs font-bold">
                                🌱 {seeding ? "Seeding..." : "Seed Database"}
                            </button>
                            <button onClick={loadDashboardMetrics} className="p-2.5 bg-gray-100 rounded-xl">
                                <Icon name="refresh-cw" className="h-4 w-4" />
                            </button>
                        </div>
                    </div>

                    {seedSuccess && <div className="p-3 bg-green-50 border rounded-xl text-xs font-mono text-green-700">{seedSuccess}</div>}

                    {/* FILTERS */}
                    <div className="bg-white p-4 rounded-xl border grid grid-cols-3 gap-3 text-xs">
                        <div>
                            <label className="text-[10px] uppercase font-bold text-gray-400">Outlet</label>
                            <select value={selectedOutletFilter} onChange={(e) => setSelectedOutletFilter(e.target.value)} className="w-full p-2 border rounded mt-1">
                                <option value="ALL">Semua Outlet</option>
                                {outlets.map(o => <option key={o.outlet_id} value={o.outlet_id}>{o.nama_outlet}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="text-[10px] uppercase font-bold text-gray-400">Dari</label>
                            <input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="w-full p-1.5 border rounded mt-1" />
                        </div>
                        <div>
                            <label className="text-[10px] uppercase font-bold text-gray-400">Hingga</label>
                            <input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} className="w-full p-1.5 border rounded mt-1" />
                        </div>
                    </div>

                    {/* KPIs */}
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div className="bg-white p-5 border rounded-2xl">
                            <span className="text-[9px] text-gray-400 uppercase font-bold">Total Omset Penjualan</span>
                            <p className="text-xl font-bold font-mono text-gray-800 mt-1">Rp {dashboardData?.summary?.total_omset?.toLocaleString("id-ID") || 0}</p>
                            <span className="text-[10px] text-gray-400 block">{dashboardData?.summary?.total_transaksi || 0} Resi</span>
                        </div>
                        <div className="bg-white p-5 border rounded-2xl">
                            <span className="text-[9px] text-gray-400 uppercase font-bold">Setoran Wajib (Owner)</span>
                            <p className="text-xl font-bold font-mono text-blue-700 mt-1">Rp {dashboardData?.summary?.total_setoran_owner?.toLocaleString("id-ID") || 0}</p>
                        </div>
                        <div className="bg-white p-5 border rounded-2xl">
                            <span className="text-[9px] text-gray-400 uppercase font-bold">Kas Operasional</span>
                            <p className="text-xl font-bold font-mono text-green-700 mt-1">Rp {dashboardData?.summary?.total_kas_operasional?.toLocaleString("id-ID") || 0}</p>
                        </div>
                    </div>

                    {/* AUDIT LOG */}
                    <div className="bg-white p-5 border rounded-2xl space-y-4">
                        <div className="flex justify-between items-center border-b pb-2">
                            <h3 className="font-bold text-sm text-gray-800">Audit Logs Aktivitas</h3>
                            <input type="text" value={auditSearch} onChange={(e) => setAuditSearch(e.target.value)} placeholder="Cari..." className="p-1.5 border rounded text-xs w-48" />
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-xs text-left divide-y">
                                <thead className="bg-gray-50 text-[9px] uppercase font-bold text-gray-400">
                                    <tr>
                                        <th className="p-2">Waktu</th>
                                        <th className="p-2">Admin</th>
                                        <th className="p-2">Aksi</th>
                                        <th className="p-2">Details</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y text-gray-600">
                                    {filteredLogs.map(l => (
                                        <tr key={l.id} className="hover:bg-gray-50">
                                            <td className="p-2 font-mono text-[10px] text-gray-400">{new Date(l.timestamp).toLocaleDateString("id-ID")}</td>
                                            <td className="p-2 font-bold">{l.admin_id}</td>
                                            <td className="p-2"><span className="bg-red-50 text-red-600 font-bold px-2 py-0.5 rounded text-[9px]">{l.action}</span></td>
                                            <td className="p-2 truncate max-w-xs">{l.details}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        // ----------------- GUIDE WORKSPACE TAB -----------------
        function DeploymentGuide() {
            return (
                <div className="max-w-3xl mx-auto p-4 space-y-6">
                    <div className="bg-white p-6 rounded-2xl border space-y-4">
                        <h2 className="text-lg font-bold text-gray-800 border-b pb-2 flex items-center gap-1.5">
                            <Icon name="book-open" className="text-emerald-600" />
                            <span>Panduan Deployment Apps Script</span>
                        </h2>
                        <div className="text-xs text-gray-600 space-y-2 leading-relaxed">
                            <p>Aplikasi ini didesain agar dapat di-host langsung dan gratis di Google Sheets & Google Apps Script!</p>
                            <p className="font-bold text-gray-800">Langkah-langkah:</p>
                            <ol className="list-decimal pl-5 space-y-1">
                               <li>Buat Spreadsheet baru di Google Drive.</li>
                               <li>Pilih menu <strong>Extensions &gt; Apps Script</strong>.</li>
                               <li>Hapus semua kode bawaan lalu buat file <strong>Code.gs</strong> dan tempelkan script backend.</li>
                               <li>Tambahkan file HTML dengan nama <strong>Index.html</strong> (bukan Index.html.html) dan salin seluruh kode dari file ini ke dalamnya.</li>
                               <li>Buka Project Settings di editor Apps Script Anda, tambahkan Script Property dengan nama <code>GEMINI_API_KEY</code> bernilai API Key Gemini Anda.</li>
                               <li>Klik <strong>Deploy &gt; New Deployment &gt; Web App</strong>, ubah "Who has access" menjadi "Anyone", klik Deploy dan berikan ijin akses Sheets. Selesai!</li>
                            </ol>
                        </div>
                    </div>
                </div>
            );
        }

        // ----------------- MAIN APP COMPONENT -----------------
        function App() {
            const { callBackend } = useAppsScript();
            
            const [session, setSession] = useState(null);
            const [currentView, setCurrentView] = useState("login");
            const [outlets, setOutlets] = useState([]);
            const [activeOutletId, setActiveOutletId] = useState("");

            useEffect(() => {
                const saved = localStorage.getItem("jnt_session");
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        setSession(parsed);
                        setActiveOutletId(parsed.outlet_id_home);
                        setCurrentView("pre-input");
                    } catch (e) {}
                }
            }, []);

            useEffect(() => {
                const load = async () => {
                    try {
                        const r = await callBackend("getOutlets");
                        if (r.status === "success") {
                            setOutlets(r.data);
                            if (session) setActiveOutletId(session.outlet_id_home);
                            else if (r.data.length > 0) setActiveOutletId(r.data[0].outlet_id);
                        }
                    } catch (e) {}
                };
                load();
            }, [session]);

            const handleLoginSuccess = (usr) => {
                setSession(usr);
                setActiveOutletId(usr.outlet_id_home);
                localStorage.setItem("jnt_session", JSON.stringify(usr));
                setCurrentView("pre-input");
            };

            const handleLogout = () => {
                setSession(null);
                localStorage.clear();
                setCurrentView("login");
            };

            return (
                <div className="flex flex-col min-h-screen">
                    {session && (
                        <header className="bg-white border-b sticky top-0 z-40 shadow-sm h-16 flex items-center justify-between px-4">
                            <div className="flex items-center gap-2">
                                <div className="bg-[#E4002B] p-2 rounded-xl text-white">
                                    <Icon name="truck" className="h-5 w-5" />
                                </div>
                                <div>
                                    <span className="font-extrabold text-sm text-gray-800">J&T OPS PRO</span>
                                    <span className="text-[10px] text-gray-400 block -mt-1">{session.role} • {session.username}</span>
                                </div>
                            </div>

                            <nav className="hidden md:flex gap-2 text-xs font-bold">
                                <button onClick={() => setCurrentView("pre-input")} className={`py-1.5 px-3 rounded-lg ${currentView === 'pre-input' ? 'bg-red-50 text-[#E4002B]' : ''}`}>Pre-Input</button>
                                <button onClick={() => setCurrentView("transaksi")} className={`py-1.5 px-3 rounded-lg ${currentView === 'transaksi' ? 'bg-red-50 text-[#E4002B]' : ''}`}>Transaksi</button>
                                <button onClick={() => setCurrentView("dashboard")} className={`py-1.5 px-3 rounded-lg ${currentView === 'dashboard' ? 'bg-red-50 text-[#E4002B]' : ''}`}>Laporan</button>
                                <button onClick={() => setCurrentView("guide")} className={`py-1.5 px-3 rounded-lg ${currentView === 'guide' ? 'bg-emerald-50 text-emerald-700' : ''}`}>Deploy Guide</button>
                            </nav>

                            <div className="flex items-center gap-3">
                                <div className="text-[10px] font-mono font-bold bg-gray-50 py-1 px-2.5 rounded border">
                                    {outlets.find(o => o.outlet_id === activeOutletId)?.nama_outlet || activeOutletId}
                                </div>
                                <button onClick={handleLogout} className="p-1.5 hover:bg-red-50 text-gray-400 hover:text-red-600 rounded">
                                    <Icon name="log-out" />
                                </button>
                            </div>
                        </header>
                    )}

                    {session && (
                        <div className="md:hidden flex bg-white border-b text-[10px] font-bold text-gray-600 text-center justify-around py-1">
                            <button onClick={() => setCurrentView("pre-input")} className={`p-2 ${currentView === 'pre-input' ? 'text-[#E4002B]' : ''}`}>Pre-Input</button>
                            <button onClick={() => setCurrentView("transaksi")} className={`p-2 ${currentView === 'transaksi' ? 'text-[#E4002B]' : ''}`}>Transaksi</button>
                            <button onClick={() => setCurrentView("dashboard")} className={`p-2 ${currentView === 'dashboard' ? 'text-[#E4002B]' : ''}`}>Laporan</button>
                            <button onClick={() => setCurrentView("guide")} className={`p-2 ${currentView === 'guide' ? 'text-emerald-700' : ''}`}>Guide</button>
                        </div>
                    )}

                    <main className="flex-grow pb-12">
                        {currentView === "login" && <LoginPage onLoginSuccess={handleLoginSuccess} />}
                        {session && currentView === "pre-input" && <PreInputPage session={session} activeOutletId={activeOutletId} onChangeActiveOutlet={setActiveOutletId} outlets={outlets} onNavigate={setCurrentView} />}
                        {session && currentView === "transaksi" && <TransaksiPage session={session} activeOutletId={activeOutletId} onChangeActiveOutlet={setActiveOutletId} outlets={outlets} onNavigate={setCurrentView} />}
                        {session && currentView === "dashboard" && <DashboardPage session={session} outlets={outlets} />}
                        {session && currentView === "guide" && <DeploymentGuide />}
                    </main>

                    <footer className="bg-white border-t py-4 text-center text-[10px] text-gray-400 font-mono">
                        J&T OPS PRO © 2026. Dikembangkan untuk efisiensi operasional J&T Express & J&T Cargo.
                    </footer>
                </div>
            );
        }

        // Mount React App
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
